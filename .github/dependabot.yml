version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      eslint:
        patterns:
          - eslint
          - eslint-*
          - "@eslint/*"
          - typescript-eslint
      vitest:
        patterns:
          - vitest
          - "@vitest/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
