services:
  studio:
    build:
      context: ../..
      dockerfile: deploy/docker/studio.Dockerfile
    environment:
      VITE_ENTANGLE_HOST_URL: ${ENTANGLE_STUDIO_HOST_API_URL:-http://localhost:7071}
    ports:
      - "${ENTANGLE_STUDIO_PORT:-3000}:3000"
    depends_on:
      host:
        condition: service_started
    networks:
      - entangle-local

  host:
    build:
      context: ../..
      dockerfile: deploy/docker/host.Dockerfile
    environment:
      ENTANGLE_HOST_PORT: ${ENTANGLE_HOST_PORT:-7071}
      ENTANGLE_HOME: /entangle-state/.entangle
      ENTANGLE_SECRETS_HOME: /entangle-secrets
      ENTANGLE_RUNTIME_BACKEND: docker
      ENTANGLE_DOCKER_NETWORK: entangle-local
      ENTANGLE_DOCKER_RUNNER_IMAGE: entangle-runner:local
      ENTANGLE_DOCKER_SHARED_STATE_TARGET: /entangle-state
      ENTANGLE_DOCKER_SHARED_STATE_VOLUME: entangle-host-state
      ENTANGLE_DOCKER_SECRET_STATE_TARGET: /entangle-secrets
      ENTANGLE_DOCKER_SECRET_STATE_VOLUME: entangle-secret-state
      ENTANGLE_DEFAULT_GIT_REMOTE_BASE: ${ENTANGLE_DEFAULT_GIT_REMOTE_BASE:-ssh://git@gitea:22}
    ports:
      - "${ENTANGLE_HOST_PORT:-7071}:7071"
    volumes:
      - entangle-host-state:/entangle-state
      - entangle-secret-state:/entangle-secrets
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - entangle-local

  runner-image:
    profiles:
      - runner-build
    image: entangle-runner:local
    build:
      context: ../..
      dockerfile: deploy/docker/runner.Dockerfile
    command:
      - "true"
    networks:
      - entangle-local

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    command:
      - --config
      - /etc/strfry.conf
      - relay
    ports:
      - "${ENTANGLE_STRFRY_PORT:-7777}:7777"
    volumes:
      - ../config/strfry.local.conf:/etc/strfry.conf:ro
      - strfry-data:/app/strfry-db
    networks:
      - entangle-local

  gitea:
    image: gitea/gitea:1.24.7
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: ${ENTANGLE_GITEA_ROOT_URL:-http://localhost:3001}
      GITEA__server__SSH_PORT: ${ENTANGLE_GITEA_SSH_PORT:-2222}
      GITEA__service__DISABLE_REGISTRATION: "true"
    ports:
      - "${ENTANGLE_GITEA_HTTP_PORT:-3001}:3000"
      - "${ENTANGLE_GITEA_SSH_PORT:-2222}:22"
    volumes:
      - gitea-data:/data
    networks:
      - entangle-local

volumes:
  entangle-host-state:
    name: entangle-host-state
  entangle-secret-state:
    name: entangle-secret-state
  gitea-data:
  strfry-data:

networks:
  entangle-local:
    name: entangle-local
