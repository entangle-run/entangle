services:
  studio:
    build:
      context: ../../..
      dockerfile: deploy/federated-dev/docker/studio.Dockerfile
    environment:
      VITE_ENTANGLE_HOST_URL: ${ENTANGLE_STUDIO_HOST_API_URL:-http://localhost:7071}
    ports:
      - "${ENTANGLE_STUDIO_PORT:-3000}:3000"
    depends_on:
      host:
        condition: service_started
    networks:
      - entangle

  host:
    build:
      context: ../../..
      dockerfile: deploy/federated-dev/docker/host.Dockerfile
    environment:
      ENTANGLE_HOST_PORT: ${ENTANGLE_HOST_PORT:-7071}
      ENTANGLE_HOME: /entangle-state/.entangle
      ENTANGLE_SECRETS_HOME: /entangle-secrets
      ENTANGLE_RUNTIME_BACKEND: docker
      ENTANGLE_DOCKER_NETWORK: entangle
      ENTANGLE_DOCKER_RUNNER_IMAGE: entangle-runner:federated-dev
      ENTANGLE_DOCKER_RUNNER_BOOTSTRAP: join
      ENTANGLE_DOCKER_RUNNER_JOIN_CONFIG_DELIVERY: json_env
      ENTANGLE_DOCKER_RUNNER_HOST_API_URL: http://host:7071
      ENTANGLE_DEFAULT_GIT_REMOTE_BASE: ${ENTANGLE_DEFAULT_GIT_REMOTE_BASE:-ssh://git@gitea:22}
      ENTANGLE_HOST_CORS_ORIGINS: ${ENTANGLE_HOST_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${ENTANGLE_HOST_PORT:-7071}:7071"
    volumes:
      - entangle-host-state:/entangle-state
      - entangle-secret-state:/entangle-secrets
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - entangle

  runner-image:
    profiles:
      - runner-build
    image: entangle-runner:federated-dev
    build:
      context: ../../..
      dockerfile: deploy/federated-dev/docker/runner.Dockerfile
    command:
      - "true"
    networks:
      - entangle

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    command:
      - --config
      - /etc/strfry.conf
      - relay
    ports:
      - "${ENTANGLE_STRFRY_PORT:-7777}:7777"
    volumes:
      - ../config/strfry.federated-dev.conf:/etc/strfry.conf:ro
      - strfry-data:/app/strfry-db
    networks:
      - entangle

  gitea:
    image: gitea/gitea:1.24.7
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: ${ENTANGLE_GITEA_ROOT_URL:-http://localhost:3001}
      GITEA__server__SSH_PORT: ${ENTANGLE_GITEA_SSH_PORT:-2222}
      GITEA__service__DISABLE_REGISTRATION: "true"
    ports:
      - "${ENTANGLE_GITEA_HTTP_PORT:-3001}:3000"
      - "${ENTANGLE_GITEA_SSH_PORT:-2222}:22"
    volumes:
      - gitea-data:/data
    networks:
      - entangle

volumes:
  entangle-host-state:
    name: entangle-host-state
  entangle-secret-state:
    name: entangle-secret-state
  gitea-data:
    name: gitea-data
  strfry-data:
    name: strfry-data

networks:
  entangle:
    name: entangle
